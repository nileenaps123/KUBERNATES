apiVersion: v1
kind: Pod
metadata:
  name: my-pod
spec:
  terminationGracePeriodSeconds: 1
  restartPolicy: Never
  containers:
  - name: ubuntu
    image: ubuntu
    volumeMounts:
    - name: secret-volume
      mountPath: /usr/share/props
    args:
    - sleep
    - "3600"  
  volumes:
  - name: secret-volume
    secret:
      secretName: app-secret

# docker run -it -v $PWD:/ws ubuntu
# This is the most important part of your command. The -v flag stands for Volume, and it maps a folder from your host computer directly into the Docker container using the format -[v] /host/folder:/container/folder.

# $PWD (Left side): This is a built-in Linux shortcut that stands for "Print Working Directory". It automatically grabs the exact path of the folder you are currently standing in on your Thinkpad (/mnt/c/Nileena/Kubernates/WORKSPACE/sec07-configuration).

# :/ws (Right side): This tells Docker to create a brand-new folder named ws inside the root directory of the Ubuntu container.

# 💡 What this achieves: It creates a real-time portal between your Windows/WSL filesystem and your container. Any file inside your sec07-configuration folder on your Thinkpad is now instantly visible and editable inside the container's /ws folder. This is exactly why you were able to cd ws, run ls, and see all your Kubernetes .yaml exercise files!