apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deploy
spec:
  selector:  
    matchLabels:
       app: my-app
  replicas: 1
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: nginx
        image: nginx  
        # startupProbe: 
        #   httpGet:
        #     path: /
        #     port: 80
        #   periodSeconds: 1
        #   failureThreshold: 30   
        # readinessProbe: 
        #   httpGet:
        #     path: /
        #     port: 80
        #   periodSeconds: 5
        #   failureThreshold: 3 
        resources:
          requests:
            cpu: 100m
            memory: 32Mi     
          limits:
            cpu: 200m
            memory: 64Mi 
---
apiVersion: v1
kind : Service
metadata:
  name: nginx
spec:
  selector:
    app: my-app
  ports:
  - port: 80
    targetPort: 80    
---
apiVersion: v1
kind : Pod
metadata:
  name: demo-pod
spec:
  terminationGracePeriodSeconds: 1
  containers:
  - name: demo
    image: vinsdocker/util         
    args:
    - "sleep"
    - "3600"                  