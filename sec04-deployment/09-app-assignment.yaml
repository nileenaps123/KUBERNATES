apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment
spec:
  selector:  
    matchLabels:
       app: assignment
  replicas: 1
  template:
    metadata:
      labels:
        app: assignment     
    spec:
      containers:
      - name: assignment
        image: vinsdocker/k8s-deploy-assignment 
        ports:
        - containerPort: 8080
          name: "app-port"   
        env:
        - name: "spring.redis.host"
          value: "10.244.2.5"  #not a good soln,just a temp soln
        - name: "spring.redis.port"
          value: "6379"        
