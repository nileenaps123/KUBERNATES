This file contains a complete, self-contained microservice testing architecture. It creates three distinct Kubernetes objects that work together: a **Deployment** to run your application, a **Service** to act as an internal router, and a standalone **Utility Pod** to test everything.

Here is a breakdown of what each section does.

---

## Part 1: The Deployment (`my-deploy`)

A Deployment tells Kubernetes how to run and scale your application containers.

```yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deploy
spec:
  replicas: 3
  selector:  
    matchLabels:
       app: my-app

```

* **`replicas: 3`**: Tells Kubernetes to ensure exactly **3 identical copies (Pods)** of your web server are running across the cluster at all times for high availability.
* **`selector`**: This is the "glue" that links the Deployment to its Pods. It tells the Deployment controller to manage any Pod tagged with the badge `app: my-app`.

```yaml
  template:
    metadata:
      labels:
        app: my-app
    spec:
      terminationGracePeriodSeconds: 1
      containers:
      - name: nginx
        image: vinsdocker/nginx-gke         
        ports:
        - containerPort: 80

```

* **`template`**: The blueprint used to create the Pods. Note that the label here (`app: my-app`) matches the selector perfectly.
* **`terminationGracePeriodSeconds: 1`**: When you delete this deployment, Kubernetes will only wait 1 second before forcefully shutting down the containers (making deletion super fast).
* **`image: vinsdocker/nginx-gke`**: The Docker image used to spin up an Nginx web server.
* **`containerPort: 80`**: Documents that Nginx inside the container is listening on port 80.

---

## Part 2: The Service (`nginx`)

Because Pods are constantly being destroyed and recreated, their internal IP addresses change. A **Service** acts as a permanent, static entry point (a built-in load balancer) to fix this.

```yaml
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  selector:
    app: my-app
  ports:
  - port: 80
    targetPort: 80

```

* **`name: nginx`**: This creates an internal DNS name. Any container inside the cluster can just type `http://nginx` to reach it.
* **`selector (app: my-app)`**: This tells the Service: *"Keep track of all Pods with the label `app: my-app` and send traffic to them."*
* **`port: 80`**: The port the Service itself listens on.
* **`targetPort: 80`**: The port on the underlying Pod containers where the Service routes the incoming traffic.

---

## Part 3: The Troubleshooting Pod (`demo-pod`)

This is a standalone utility Pod created completely separately from the deployment.

```yaml
apiVersion: v1
kind : Pod
metadata:
  name: demo-pod
spec:
  terminationGracePeriodSeconds: 1
  containers:
  - name: demo
    image: vinsdocker/util          
    args:
    - "sleep"
    - "3600"

```

* **`image: vinsdocker/util`**: A specialized image packed with networking tools like `curl`, `wget`, and `nslookup`.
* **`args: ["sleep", "3600"]`**: This tells the container to sit quietly and do nothing for an hour. It keeps the Pod in a `Running` state so you can interact with it.

---

## The Big Picture: How They Interact

This entire manifest is designed for a **networking lab**.

Once you apply this file, you can "hop inside" the utility pod and test your cluster's internal routing using these steps:

1. You use `kubectl exec -it demo-pod -- bash` to jump inside the troubleshooting container.
2. Inside that container, you run `curl http://nginx`.
3. The cluster's internal DNS system resolves `nginx` to your **Service**.
4. The Service receives the request on port `80` and load-balances it to one of your **3 deployment Pods** on their `targetPort 80`, returning an Nginx web page!






















The reason curl my-app failed with Could not resolve host is because my-app is a label, not a network address. In Kubernetes, your individual containers can only discover and talk to things by their Service Name, not by their deployment name, pod names, or labels.

Looking at your YAML file, you named your service nginx, not my-app:


apiVersion: v1
kind: Service
metadata:
  name: nginx  # 💡 THIS is your network domain name!
spec:
  selector:
    app: my-app
    
    
The Fix
While you are still inside the demo-pod terminal, change your command to use the actual service name instead:

curl http://nginx


Why this works:
When you type curl nginx, CoreDNS (the internal DNS manager inside your Kubernetes cluster) looks up the Service named nginx.

The nginx Service looks at its selector (app: my-app) and finds all matching pods.

The Service then seamlessly routes your traffic to one of your 3 live deployment pods.


